<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' data:; img-src 'self' data: https://*.basemaps.cartocdn.com https://*.tile.openstreetmap.org https://server.arcgisonline.com; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self'">
  <title>VoucherVisionGO Editor</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="js/lib/leaflet.min.css">
</head>
<body>
  <div id="app">
    <!-- Nav Bar -->
    <header id="nav-bar"></header>

    <!-- Main Content -->
    <main id="main-content">
      <!-- Folder Picker (initial view) -->
      <div id="folder-picker-view" class="view active"></div>

      <!-- Specimen Review View -->
      <div id="review-view" class="view"></div>

      <!-- Batch Table View -->
      <div id="table-view" class="view"></div>

      <!-- Focus View -->
      <div id="focus-view" class="view"></div>
    </main>
  </div>

  <script src="js/lib/leaflet.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
